<!-- 윤봄네 냉장고 — 입력 프로토타입 v0.12 (2026-07-18)
     자체완결 웹앱 · Web Speech(ko-KR) + 규칙기반 재료 매칭 + localStorage
     목적: 냉장고 재료를 실제로 입력하며 재료 마스터·alias를 실측으로 다듬는다.
     v0.9: Supabase 배선 — 로컬 우선 + 공유 냉장고 동기화(둘이 냉장고 하나). PostgREST fetch, 라이브러리 무의존. -->
<title>윤봄네 냉장고 — 입력</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
  :root {
    --ground:#FAFBFC; --raised:#FFFFFF; --ink:#15181C; --ink-soft:#444C57;
    --muted:#6B7480; --line:#E2E6EB; --line-soft:#EDF0F3;
    --accent:#2E5D4F; --accent-soft:#E8F0ED;
    --open:#8A5D0B; --open-soft:#FBF2E0;
    --rec:#D6473E; --rec-soft:#FBE9E7;
    --cold:#2C6E9B; --cold-soft:#E6F0F7;   /* 냉동 */
    --cool:#2E7D5B; --cool-soft:#E4F1EA;   /* 냉장 */
    --room:#8A5D0B; --room-soft:#FBF2E0;   /* 실온 */
    --measure:40rem;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  }
  @media (prefers-color-scheme: dark){ :root{
    --ground:#101317; --raised:#171B20; --ink:#EDF0F3; --ink-soft:#B4BCC6;
    --muted:#838D99; --line:#2A3138; --line-soft:#21272D;
    --accent:#7FBBA6; --accent-soft:#1B2A26; --open:#D6A455; --open-soft:#2A2318;
    --rec:#F0857C; --rec-soft:#2E1B19;
    --cold:#6FB0DA; --cold-soft:#152532; --cool:#78C79E; --cool-soft:#16281F;
    --room:#E0AC63; --room-soft:#2A2013;
  }}
  :root[data-theme="dark"]{
    --ground:#101317; --raised:#171B20; --ink:#EDF0F3; --ink-soft:#B4BCC6;
    --muted:#838D99; --line:#2A3138; --line-soft:#21272D;
    --accent:#7FBBA6; --accent-soft:#1B2A26; --open:#D6A455; --open-soft:#2A2318;
    --rec:#F0857C; --rec-soft:#2E1B19;
    --cold:#6FB0DA; --cold-soft:#152532; --cool:#78C79E; --cool-soft:#16281F;
    --room:#E0AC63; --room-soft:#2A2013;
  }
  :root[data-theme="light"]{
    --ground:#FAFBFC; --raised:#FFFFFF; --ink:#15181C; --ink-soft:#444C57;
    --muted:#6B7480; --line:#E2E6EB; --line-soft:#EDF0F3;
    --accent:#2E5D4F; --accent-soft:#E8F0ED; --open:#8A5D0B; --open-soft:#FBF2E0;
    --rec:#D6473E; --rec-soft:#FBE9E7;
    --cold:#2C6E9B; --cold-soft:#E6F0F7; --cool:#2E7D5B; --cool-soft:#E4F1EA;
    --room:#8A5D0B; --room-soft:#FBF2E0;
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:var(--measure);margin:0 auto;padding:0 1rem 7rem}

  header{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--ground) 90%,transparent);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(0.6rem + env(safe-area-inset-top)) 1rem 0.55rem}
  .head-inner{max-width:var(--measure);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
  .brand{font-weight:700;letter-spacing:-.01em;font-size:1.05rem}
  .brand small{color:var(--muted);font-weight:500;font-size:.72rem;margin-left:.35rem}
  .export{font:inherit;font-size:.74rem;font-weight:700;padding:.35rem .6rem;border-radius:8px;cursor:pointer;
    border:1px solid var(--line);background:var(--raised);color:var(--ink-soft);-webkit-tap-highlight-color:transparent}
  .export[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .export:disabled{opacity:.5}

  /* 세션 피드 */
  .session{background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:.7rem .8rem;margin-top:1rem}
  .session .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
  .session .sh b{font-size:.82rem}
  .session .sh .clr{font:inherit;font-size:.74rem;color:var(--muted);background:none;border:0;cursor:pointer;text-decoration:underline}
  .sess-chips{display:flex;flex-wrap:wrap;gap:.35rem}
  .sess-chip{font-size:.8rem;font-weight:600;padding:.25rem .55rem;border-radius:999px}
  .sess-chip[data-s="냉동"]{background:var(--cold-soft);color:var(--cold)}
  .sess-chip[data-s="냉장"]{background:var(--cool-soft);color:var(--cool)}
  .sess-chip[data-s="실온"]{background:var(--room-soft);color:var(--room)}
  .sess-chip.gone{background:var(--line-soft);color:var(--muted);text-decoration:line-through}

  .tabs{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:4px;background:var(--line-soft);padding:4px;border-radius:11px;margin-top:.55rem}
  .tabs button{font:inherit;font-size:.9rem;font-weight:650;padding:.5rem;border:0;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer}
  .tabs button[aria-selected="true"]{background:var(--raised);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

  .view{padding-top:1rem}
  .hidden{display:none}

  /* 입력 */
  .mic-wrap{display:flex;flex-direction:column;align-items:center;gap:.6rem;padding:1.2rem 0 .5rem}
  .mic{width:5.5rem;height:5.5rem;border-radius:50%;border:0;cursor:pointer;background:var(--accent);color:#fff;
    font-size:1.7rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(46,93,79,.35);
    -webkit-tap-highlight-color:transparent}
  :root[data-theme="dark"] .mic{color:#0d1114}
  @media (prefers-color-scheme:dark){.mic{color:#0d1114}}
  .mic[data-on="1"]{background:var(--rec);box-shadow:0 6px 18px rgba(214,71,62,.4);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @media (prefers-reduced-motion:reduce){.mic[data-on="1"]{animation:none}}
  .mic-hint{font-size:.82rem;color:var(--muted);text-align:center;min-height:1.2rem}
  .mic-hint b{color:var(--ink-soft)}

  .textrow{display:flex;gap:.4rem;margin:.4rem 0 0}
  .textrow input{flex:1;font:inherit;font-size:.95rem;padding:.6rem .7rem;border:1px solid var(--line);border-radius:10px;background:var(--raised);color:var(--ink)}
  .textrow button{font:inherit;font-weight:700;font-size:.9rem;padding:0 .9rem;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);border-radius:10px;cursor:pointer}

  .banner{margin:.8rem 0 0;padding:.7rem .85rem;border-radius:11px;font-size:.85rem;display:none}
  .banner.show{display:block}
  .banner.warn{background:var(--open-soft);color:var(--open)}
  .banner.err{background:var(--rec-soft);color:var(--rec)}

  /* 컨펌 */
  .confirm{margin-top:1.1rem}
  .confirm h2{font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 .5rem;display:flex;justify-content:space-between}
  .confirm h2 .mode{color:var(--rec)}
  .batchbar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;background:var(--accent-soft);border-radius:11px;padding:.55rem .7rem;margin-bottom:.6rem}
  .batchbar .lab{font-size:.8rem;font-weight:700;color:var(--accent)}
  .batchbar .seg3{background:var(--raised)}
  .rows{display:flex;flex-direction:column;gap:.5rem}
  .row{background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:.6rem .7rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .row .nm{font-weight:650;font-size:1rem;flex:1;min-width:5rem}
  .row .nm .new{font-size:.66rem;font-weight:700;color:var(--open);background:var(--open-soft);padding:.1rem .35rem;border-radius:999px;margin-left:.35rem;vertical-align:middle}
  .seg3{display:inline-flex;background:var(--line-soft);border-radius:9px;padding:3px;gap:2px}
  .seg3 button{font:inherit;font-size:.76rem;font-weight:700;border:0;background:transparent;color:var(--muted);padding:.28rem .5rem;border-radius:7px;cursor:pointer;white-space:nowrap}
  .seg3 button[data-on="1"][data-s="냉동"]{background:var(--cold-soft);color:var(--cold)}
  .seg3 button[data-on="1"][data-s="냉장"]{background:var(--cool-soft);color:var(--cool)}
  .seg3 button[data-on="1"][data-s="실온"]{background:var(--room-soft);color:var(--room)}
  .row .del{font:inherit;border:0;background:none;color:var(--muted);font-size:1.15rem;cursor:pointer;padding:.1rem .3rem;line-height:1}
  .newcat{flex-basis:100%;display:flex;gap:.4rem;align-items:center;margin-top:.15rem}
  .newcat select{font:inherit;font-size:.8rem;padding:.35rem .4rem;border:1px solid var(--line);border-radius:8px;background:var(--ground);color:var(--ink)}
  .newcat label{font-size:.72rem;color:var(--muted)}

  .addrow{display:flex;gap:.4rem;margin-top:.55rem}
  .addrow input{flex:1;font:inherit;font-size:.9rem;padding:.5rem .6rem;border:1px dashed var(--line);border-radius:10px;background:transparent;color:var(--ink)}
  .addrow button{font:inherit;font-weight:700;font-size:.85rem;padding:0 .8rem;border:1px solid var(--line);background:var(--raised);color:var(--ink-soft);border-radius:10px;cursor:pointer}

  .confirm-actions{display:flex;gap:.5rem;margin-top:.9rem}
  .btn-primary{flex:1;font:inherit;font-weight:800;font-size:1rem;padding:.8rem;border:0;border-radius:12px;background:var(--accent);color:#fff;cursor:pointer}
  :root[data-theme="dark"] .btn-primary{color:#0d1114}
  @media (prefers-color-scheme:dark){.btn-primary{color:#0d1114}}
  .btn-ghost{font:inherit;font-weight:700;font-size:.9rem;padding:.8rem 1rem;border:1px solid var(--line);border-radius:12px;background:var(--raised);color:var(--muted);cursor:pointer}

  .toast{position:fixed;left:50%;bottom:5.5rem;transform:translateX(-50%);background:var(--ink);color:var(--ground);
    padding:.55rem .9rem;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:20}
  .toast.show{opacity:.95}

  /* 재고 */
  .stotabs{display:flex;gap:.4rem;margin-bottom:.8rem}
  .stotabs button{font:inherit;font-size:.85rem;font-weight:700;padding:.45rem .8rem;border-radius:999px;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer}
  .stotabs button[aria-selected="true"][data-s="냉동"]{background:var(--cold-soft);color:var(--cold);border-color:transparent}
  .stotabs button[aria-selected="true"][data-s="냉장"]{background:var(--cool-soft);color:var(--cool);border-color:transparent}
  .stotabs button[aria-selected="true"][data-s="실온"]{background:var(--room-soft);color:var(--room);border-color:transparent}
  .invlist{display:flex;flex-direction:column;gap:.4rem}
  .invitem{background:var(--raised);border:1px solid var(--line);border-radius:11px;padding:.6rem .8rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
  .invitem .n{font-weight:600}
  .invitem .meta{font-size:.72rem;color:var(--muted);font-family:var(--mono)}
  .invitem .gone{font:inherit;font-size:.76rem;font-weight:700;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:.25rem .5rem;cursor:pointer}
  .empty{color:var(--muted);text-align:center;padding:2rem 0;font-size:.9rem}

  /* 레시피 */
  .rec-cats{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
  .rec-cats button{font:inherit;font-size:.82rem;font-weight:700;padding:.4rem .8rem;border-radius:999px;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer}
  .rec-cats button[aria-selected="true"]{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .menu-list{display:flex;flex-direction:column;gap:.4rem}
  .menu-item{background:var(--raised);border:1px solid var(--line);border-radius:11px;padding:.7rem .85rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;cursor:pointer;font:inherit;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
  .menu-item .mn{font-weight:650;font-size:1rem}
  .menu-item .mc{font-size:.72rem;color:var(--muted);margin-left:.35rem}
  .menu-item .arw{color:var(--muted);font-size:1.2rem;line-height:1}
  /* 레시피 상세 — 부엌에서 폰 세워두고 보기 (글자 크게) */
  .recipe-detail .rback{font:inherit;font-size:.86rem;font-weight:700;color:var(--accent);background:none;border:0;cursor:pointer;padding:.2rem 0;margin-bottom:.4rem}
  .recipe-detail h2{font-size:1.5rem;margin:.1rem 0 .15rem;letter-spacing:-.01em}
  .recipe-detail .rmeta{font-size:.8rem;color:var(--muted);margin-bottom:.9rem}
  .recipe-detail pre{white-space:pre-wrap;word-break:break-word;font-family:var(--sans);font-size:1.06rem;line-height:1.7;background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:1rem;margin:0}
  .recipe-detail .rurl{display:inline-block;margin-top:.8rem;font-size:.86rem;color:var(--cold);text-decoration:underline}

  /* 추천 */
  .rec-intro{text-align:center;padding:1.2rem 0 .4rem}
  .rec-go{font:inherit;font-weight:800;font-size:1.05rem;padding:.85rem 1.4rem;border:0;border-radius:12px;background:var(--accent);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}
  :root[data-theme="dark"] .rec-go{color:#0d1114}
  @media(prefers-color-scheme:dark){.rec-go{color:#0d1114}}
  .rec-go:disabled{opacity:.55}
  .rec-sub{font-size:.82rem;color:var(--muted);margin-top:.6rem;min-height:1.2rem}
  .rec-cards{display:flex;flex-direction:column;gap:.7rem;margin-top:.4rem}
  .rcard{background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:.9rem 1rem}
  .rcard.accepted{border-color:var(--accent)}
  .rcard.gone{opacity:.4}
  .rc-type{font-size:.66rem;font-weight:800;letter-spacing:.04em;color:var(--accent);background:var(--accent-soft);padding:.14rem .5rem;border-radius:999px}
  .rcard h3{font-size:1.25rem;margin:.45rem 0 .5rem;letter-spacing:-.01em}
  .rc-buy{font-size:.92rem;margin:.2rem 0}
  .rc-buy b{color:var(--rec)}
  .rc-buy.none{color:var(--muted)}
  .rc-side{font-size:.8rem;color:var(--muted);margin:.2rem 0}
  .rc-actions{display:flex;gap:.5rem;margin-top:.75rem}
  .rc-accept{flex:1;font:inherit;font-weight:800;font-size:.95rem;padding:.6rem;border:0;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer}
  :root[data-theme="dark"] .rc-accept{color:#0d1114}
  @media(prefers-color-scheme:dark){.rc-accept{color:#0d1114}}
  .rc-reject{font:inherit;font-weight:700;font-size:.9rem;padding:.6rem 1.1rem;border:1px solid var(--line);border-radius:10px;background:var(--raised);color:var(--muted);cursor:pointer}
  .rc-recipe{margin-top:.7rem;white-space:pre-wrap;word-break:break-word;font-size:1.02rem;line-height:1.65;background:var(--ground);border:1px solid var(--line);border-radius:10px;padding:.85rem}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>

<header>
  <div class="head-inner">
    <div class="brand">윤봄네 냉장고<small>입력 프로토타입 v0.12</small></div>
    <div style="display:flex;gap:.4rem">
      <span id="syncDot" title="공유 동기화 상태" style="align-self:center;font-size:.72rem;font-weight:700;color:var(--muted)">☁︎…</span>
      <button class="export" id="wakeBtn" type="button" aria-pressed="true" title="화면 꺼짐 방지">🔆 화면유지</button>
      <button class="export" id="exportBtn" type="button">내보내기</button>
    </div>
  </div>
  <div class="head-inner">
    <div class="tabs" role="tablist" style="flex:1">
      <button role="tab" aria-selected="true" data-view="input">입력</button>
      <button role="tab" aria-selected="false" data-view="stock">재고</button>
      <button role="tab" aria-selected="false" data-view="recipe">레시피</button>
      <button role="tab" aria-selected="false" data-view="recommend">추천</button>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- 입력 -->
  <section class="view" id="view-input">
    <div class="mic-wrap">
      <button class="mic" id="mic" type="button" data-on="0" aria-label="녹음">🎤</button>
      <div class="mic-hint" id="micHint">탭해서 말하기 — 예: “두부 계란 대파 샀어”</div>
    </div>
    <div class="textrow">
      <input id="textin" type="text" placeholder="⌨️ 직접 입력 (음성이 어려울 때)" autocomplete="off">
      <button id="textgo" type="button">분석</button>
    </div>

    <div class="session hidden" id="session"></div>

    <div class="banner warn" id="iosNote"></div>
    <div class="banner err" id="errNote"></div>

    <div class="confirm hidden" id="confirm">
      <h2><span>확인 — 재료명·보관만 보면 됩니다</span><span class="mode" id="mode"></span></h2>
      <div class="batchbar hidden" id="batchbar"></div>
      <div class="rows" id="rows"></div>
      <div class="addrow">
        <input id="addin" type="text" placeholder="+ 빠진 재료 직접 추가" autocomplete="off">
        <button id="addgo" type="button">추가</button>
      </div>
      <div class="confirm-actions">
        <button class="btn-primary" id="confirmBtn" type="button">확인</button>
        <button class="btn-ghost" id="cancelBtn" type="button">취소</button>
      </div>
    </div>
  </section>

  <!-- 재고 -->
  <section class="view hidden" id="view-stock">
    <div class="stotabs" id="stotabs">
      <button aria-selected="true" data-s="냉장">냉장</button>
      <button aria-selected="false" data-s="냉동">냉동</button>
      <button aria-selected="false" data-s="실온">실온</button>
    </div>
    <div class="invlist" id="invlist"></div>
  </section>

  <!-- 레시피 -->
  <section class="view hidden" id="view-recipe">
    <div class="rec-cats" id="recCats"></div>
    <div class="menu-list" id="menuList"><div class="empty">불러오는 중…</div></div>
    <div class="recipe-detail hidden" id="recipeDetail"></div>
  </section>

  <!-- 추천 -->
  <section class="view hidden" id="view-recommend">
    <div class="rec-intro" id="recIntro">
      <button class="rec-go" id="recGo" type="button">🍚 오늘 저녁 추천 받기</button>
      <div class="rec-sub" id="recSub">냉장고 재고 + 우리집 레시피로 한 상 7개를 골라줘요 (약 30초)</div>
    </div>
    <div class="rec-cards" id="recCards"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<!-- 실시간 동기화용 supabase-js (WebSocket 구독 전용). 로드 실패해도 fetch 기반 동작·포커스 폴링은 유지. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";

  // ── Supabase 배선 (로컬 우선 + 공유 냉장고 동기화) ──
  // 라이브러리 없이 PostgREST에 fetch. anon 키는 공개 키(RLS로 보호). service_role 아님.
  var SB_BASE="https://ymbdwhirylesqugecekc.supabase.co";
  var SB_URL=SB_BASE+"/rest/v1";
  var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltYmR3aGlyeWxlc3F1Z2VjZWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTIyODMsImV4cCI6MjA5OTkyODI4M30.mAMf8dQ5M_0cKCmTQCDBvFU0A3W2bfMqNqdsdZwaNbM";
  var SB_HH="a0000000-0000-4000-8000-000000000001";
  var idByName={};   // 재료명 → ingredients.id (Supabase)
  var sbOK=false, rtLive=false;
  function sbH(extra){ var h={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"}; if(extra) for(var k in extra) h[k]=extra[k]; return h; }
  function sbFetch(method,pathq,body,headers){
    return fetch(SB_URL+pathq,{method:method,headers:sbH(headers),body:body?JSON.stringify(body):undefined})
      .then(function(r){ return r.text().then(function(t){ if(!r.ok) throw new Error(r.status+" "+t); return t?JSON.parse(t):null; }); });
  }
  function setSync(state){
    var el=document.getElementById("syncDot"); if(!el) return;
    if(state==="ok"){
      if(rtLive){ el.textContent="⚡공유"; el.title="실시간 공유 동기화 중"; }
      else { el.textContent="☁︎✓"; el.title="공유 냉장고 동기화됨"; }
      el.style.color="var(--accent)";
    }
    else if(state==="sync"){ el.textContent="☁︎…"; el.style.color="var(--muted)"; el.title="동기화 중…"; }
    else { el.textContent="☁︎⚠"; el.style.color="var(--open)"; el.title="오프라인 — 로컬에만 저장됨 (연결되면 자동 반영)"; }
  }
  function isoOf(ms){ return new Date(ms||Date.now()).toISOString(); }
  function msOf(iso){ var t=Date.parse(iso); return isNaN(t)?0:t; }

  // 재료 카탈로그 당겨오기 → 다른 폰이 추가한 재료를 로컬 파서에 병합
  function pullCatalog(){
    return Promise.all([
      sbFetch("GET","/ingredients?household_id=eq."+SB_HH+"&select=id,name,category,mgmt_type,default_storage,for_lunchbox"),
      sbFetch("GET","/ingredient_aliases?select=ingredient_id,alias")
    ]).then(function(res){
      var ings=res[0]||[], als=res[1]||[];
      idByName={}; ings.forEach(function(g){ idByName[g.name]=g.id; });
      var alById={}; als.forEach(function(a){ (alById[a.ingredient_id]=alById[a.ingredient_id]||[]).push(a.alias); });
      var changed=false;
      ings.forEach(function(g){
        if(!findIng(g.name)){ // 로컬에 없는(=다른 폰이 추가한) 재료면 ext에 편입
          ext.push({n:g.name,s:g.default_storage,m:g.mgmt_type,c:g.category,a:alById[g.id]||[]}); changed=true;
        }
      });
      if(changed){ save(LS_EXT,ext); SURF=buildSurfaces(); }
    });
  }

  // 재고 당겨와 로컬과 병합 (더 최신 것이 이김)
  function pullInv(){
    return sbFetch("GET","/inventory?select=storage,status,status_updated_at,ingredients(name)").then(function(rows){
      var changed=false;
      (rows||[]).forEach(function(r){
        if(!r.ingredients) return;
        var nm=r.ingredients.name, st=r.storage, upd=msOf(r.status_updated_at);
        inv[nm]=inv[nm]||{};
        var cur=inv[nm][st];
        if(!cur || (upd > (cur.updated||0))){ inv[nm][st]={status:r.status,updated:upd,src:cur?cur.src:"공유"}; changed=true; }
      });
      if(changed){ save(LS_INV,inv); }
    });
  }

  // 재료가 Supabase에 있도록 보장 (없으면 생성 + 별칭)
  function ensureIngredient(name){
    if(idByName[name]) return Promise.resolve(idByName[name]);
    var meta=findIng(name) || {n:name,s:"냉장",m:"신선",c:"기타",a:[]};
    var row={household_id:SB_HH,name:name,category:meta.c||"기타",mgmt_type:meta.m||"신선",default_storage:meta.s||"냉장",for_lunchbox:!!meta.lunch,is_seed:false};
    return sbFetch("POST","/ingredients?on_conflict=household_id,name",row,{Prefer:"resolution=merge-duplicates,return=representation"})
      .then(function(res){
        var id=(res&&res[0]&&res[0].id); if(!id) return null;
        idByName[name]=id;
        var als=(meta.a||[]).map(function(a){ return {ingredient_id:id,alias:a}; });
        if(als.length) return sbFetch("POST","/ingredient_aliases?on_conflict=ingredient_id,alias",als,{Prefer:"resolution=merge-duplicates,return=minimal"}).then(function(){return id;});
        return id;
      });
  }

  // 로컬 inv[name]의 모든 칸을 Supabase에 upsert (담기·없앰·마이그레이션 공용)
  function pushInvName(name){
    if(!inv[name]) return Promise.resolve();
    return ensureIngredient(name).then(function(id){
      if(!id) return;
      var rows=Object.keys(inv[name]).map(function(st){
        var b=inv[name][st];
        return {ingredient_id:id,storage:st,status:b.status,status_source:b.src||"음성",status_updated_at:isoOf(b.updated)};
      });
      if(!rows.length) return;
      return sbFetch("POST","/inventory?on_conflict=ingredient_id,storage",rows,{Prefer:"resolution=merge-duplicates,return=minimal"});
    });
  }
  // 여러 이름을 순차 push (요청 폭주 방지). 실패분은 dirty 큐에 넣어 나중에 재전송.
  function markDirty(names){ var d=load(LS_DIRTY,[]); names.forEach(function(n){ if(d.indexOf(n)<0) d.push(n); }); save(LS_DIRTY,d); }
  function syncWrite(names){
    if(!names.length) return Promise.resolve();
    setSync("sync"); var failed=[];
    return names.reduce(function(p,nm){
      return p.then(function(){ return pushInvName(nm).catch(function(){ failed.push(nm); }); });
    }, Promise.resolve()).then(function(){
      if(failed.length){ markDirty(failed); setSync("off"); } else { setSync("ok"); }
    });
  }
  function flushDirty(){
    var d=load(LS_DIRTY,[]); if(!d.length) return Promise.resolve();
    save(LS_DIRTY,[]);          // 낙관적 클리어 — 실패분은 syncWrite가 다시 넣음
    return syncWrite(d);
  }

  // 부팅: 로컬로 즉시 그린 뒤 → 당겨 병합 → (최초 1회) 로컬 재고 밀어올림 → 재그림
  function sbBoot(){
    setSync("sync");
    pullCatalog()
      .then(pullInv)
      .then(function(){
        renderStock(); renderSession();
        if(!localStorage.getItem("naengbu_sb_pushed")){
          return syncWrite(Object.keys(inv)).then(function(){ try{localStorage.setItem("naengbu_sb_pushed","1");}catch(e){} });
        }
        return flushDirty();
      })
      .then(function(){ sbOK=true; var d=load(LS_DIRTY,[]); setSync(d.length?"off":"ok"); initRealtime(); })
      .catch(function(){ sbOK=false; setSync("off"); });
  }
  // 다른 폰 변경을 반영: 포커스 복귀 시 재고 다시 당김 (실시간이 끊겨도 되는 안전망)
  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible"){ pullInv().then(function(){ renderStock(); setSync("ok"); }).catch(function(){ setSync("off"); }); }
  });

  // ── 실시간 동기화 (supabase-js WebSocket 구독) ──
  // CDN 로드 실패 시 조용히 건너뜀 — 포커스 폴링이 안전망.
  var rtClient=null, rtTimer=null;
  function rtRefreshInv(){ if(rtTimer) clearTimeout(rtTimer); rtTimer=setTimeout(function(){ pullInv().then(function(){ renderStock(); }).catch(function(){}); }, 400); }
  function initRealtime(){
    if(rtClient || typeof window.supabase==="undefined" || !window.supabase.createClient) return;
    try{
      rtClient=window.supabase.createClient(SB_BASE, SB_KEY, {realtime:{params:{eventsPerSecond:3}}});
      rtClient.channel("naengbu-shared")
        .on("postgres_changes",{event:"*",schema:"public",table:"inventory"}, rtRefreshInv)
        .on("postgres_changes",{event:"*",schema:"public",table:"ingredients"}, function(){ pullCatalog().then(rtRefreshInv).catch(function(){}); })
        .subscribe(function(status){
          if(status==="SUBSCRIBED"){ rtLive=true; setSync("ok"); }
          else if(status==="CHANNEL_ERROR"||status==="TIMED_OUT"||status==="CLOSED"){ rtLive=false; setSync(sbOK?"ok":"off"); }
        });
    }catch(e){}
  }

  var CATS = ["육류","수산물","채소","과일","유제품","곡류·면","소스·양념","김치·절임","냉동식품","반찬·조리","기타"];
  var STORAGES = ["냉동","냉장","실온"];

  // ── localStorage 상태 ──
  var LS_INV="naengbu_inv", LS_EXT="naengbu_masterext", LS_SESS="naengbu_session", LS_DIRTY="naengbu_dirty";
  function load(k,d){ try{ return JSON.parse(localStorage.getItem(k))||d; }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  // inv[재료명] = { "냉동":{status,updated,src}, "냉장":{...}, "실온":{...} }
  // 한 재료가 여러 칸에 동시 존재 가능 (예: 대파 실온+냉동). 추천은 어느 칸이든 '있음'이면 됨.
  var inv = load(LS_INV,{});
  var ext = load(LS_EXT,[]);      // 사용자가 추가한 신규 재료 (MASTER와 동형)
  var session = load(LS_SESS,[]); // 이번 세션에 담은 것 (연속성 피드)

  // 구버전(재료당 보관 1개) → 신버전(칸별 버킷) 마이그레이션
  (function migrate(){
    var changed=false;
    Object.keys(inv).forEach(function(k){
      var v=inv[k];
      if(v && typeof v.status==="string" && typeof v.storage==="string"){
        var b={}; b[v.storage]={status:v.status,updated:v.updated,src:v.src};
        inv[k]=b; changed=true;
      }
    });
    if(changed) save(LS_INV,inv);
  })();

  // 마스터 재료 분리(멸치→국물용멸치, 치즈→슈레드치즈)에 따른 기존 재고 키 이관
  (function renameInv(){
    var R={"멸치":"국물용멸치","치즈":"슈레드치즈"};
    var changed=false;
    Object.keys(R).forEach(function(o){
      if(inv[o]){ var nn=R[o]; inv[nn]=inv[nn]||{};
        Object.keys(inv[o]).forEach(function(st){ if(!inv[nn][st]) inv[nn][st]=inv[o][st]; });
        delete inv[o]; changed=true; }
    });
    if(changed) save(LS_INV,inv);
  })();

  // 일회성: 기존 냉장 '간장'은 양념간장이었음 (사용자 확인)
  (function migV1(){
    if(localStorage.getItem("naengbu_migv")) return;
    if(inv["간장"] && inv["간장"]["냉장"]){
      inv["양념간장"]=inv["양념간장"]||{};
      if(!inv["양념간장"]["냉장"]) inv["양념간장"]["냉장"]=inv["간장"]["냉장"];
      delete inv["간장"]["냉장"];
      if(Object.keys(inv["간장"]).length===0) delete inv["간장"];
      save(LS_INV,inv);
    }
    try{ localStorage.setItem("naengbu_migv","1"); }catch(e){}
  })();

  function allMaster(){ return MASTER.concat(ext); }

  // 별칭 → 재료 매핑 (surface 길이 desc)
  function buildSurfaces(){
    var arr=[];
    allMaster().forEach(function(it){
      arr.push({surf:it.n, ing:it});
      (it.a||[]).forEach(function(al){ arr.push({surf:al, ing:it}); });
    });
    arr.sort(function(x,y){ return y.surf.length - x.surf.length; });
    return arr;
  }
  var SURF = buildSurfaces();
  function findIng(name){
    var s=name.trim();
    for(var i=0;i<SURF.length;i++){ if(SURF[i].surf===s) return SURF[i].ing; }
    return null;
  }

  // ── 파싱 (규칙기반) ──
  var SOJI = /(떨어졌|다\s*썼|다\s*떨어|없어졌|다\s*먹었|다\s*씀|바닥)/;
  function detectStorage(t){
    if(/냉동/.test(t)) return "냉동";
    if(/냉장/.test(t)) return "냉장";
    if(/실온|상온|팬트리|찬장/.test(t)) return "실온";
    return null;
  }
  function parse(text){
    var t = (text||"").replace(/[.,!?~]/g," ");
    var mode = SOJI.test(t) ? "소진" : "입고";
    var batch = detectStorage(t);
    var consumed = new Array(t.length);
    var found=[];
    SURF.forEach(function(s){
      var idx=t.indexOf(s.surf);
      while(idx!==-1){
        var free=true;
        for(var i=idx;i<idx+s.surf.length;i++){ if(consumed[i]){free=false;break;} }
        if(free){
          for(var j=idx;j<idx+s.surf.length;j++) consumed[j]=true;
          if(found.indexOf(s.ing)===-1) found.push(s.ing);
        }
        idx=t.indexOf(s.surf, idx+1);
      }
    });
    return {mode:mode, items:found, batch:batch};
  }

  // ── 컨펌 상태 ──
  var draft=[];    // [{name, storage, cat, mgmt, isNew}]
  var draftMode="입고";
  var draftBatch=null;  // 칸 단위 보관 (냉동/냉장/실온) — 지정 시 전체 적용

  function setBatch(s){ draftBatch=s; draft.forEach(function(d){ d.storage=s; }); renderConfirm(); }

  function toDraft(name, storage, cat, mgmt, isNew){
    return {name:name, storage:storage, cat:cat||"기타", mgmt:mgmt||"신선", isNew:!!isNew};
  }

  function startConfirm(text){
    var r = parse(text);
    draftMode = r.mode;
    draftBatch = r.batch;  // 발화에 "냉동실에" 등이 있으면 칸 보관 자동
    draft = r.items.map(function(it){ return toDraft(it.n, r.batch||it.s, it.c, it.m, false); });
    if(draft.length===0){
      showErr("인식된 재료가 없어요. 아래 “빠진 재료 직접 추가”로 넣거나 다시 말해보세요.");
    } else { hideErr(); }
    renderConfirm();
  }

  function addByName(name){
    name=(name||"").trim(); if(!name) return;
    if(draft.some(function(d){return d.name===name;})){ toast("이미 있음"); return; }
    var ing=findIng(name);
    if(ing){ draft.push(toDraft(ing.n, draftBatch||ing.s, ing.c, ing.m, false)); }
    else { draft.push(toDraft(name, draftBatch||"냉장", "기타", "신선", true)); } // 신규: 기본값, 사용자가 조정
    renderConfirm();
  }

  // ── 렌더: 컨펌 ──
  var confirmEl=document.getElementById("confirm");
  var rowsEl=document.getElementById("rows");
  var modeEl=document.getElementById("mode");
  var batchEl=document.getElementById("batchbar");
  function renderConfirm(){
    confirmEl.classList.remove("hidden");
    modeEl.textContent = draftMode==="소진" ? "🗑 소진 — 없음 처리" : "";

    // 칸 단위 보관 (냉동실 한 칸 통째로 입력할 때 6번 탭 → 1번)
    batchEl.innerHTML="";
    if(draftMode!=="소진" && draft.length>0){
      batchEl.classList.remove("hidden");
      var lab=document.createElement("span"); lab.className="lab"; lab.textContent="이 칸 전체";
      batchEl.appendChild(lab);
      var seg=document.createElement("div"); seg.className="seg3";
      STORAGES.forEach(function(s){
        var b=document.createElement("button"); b.type="button"; b.dataset.s=s;
        b.dataset.on = draftBatch===s?"1":"0"; b.textContent=s;
        b.addEventListener("click",function(){ setBatch(s); });
        seg.appendChild(b);
      });
      batchEl.appendChild(seg);
    } else { batchEl.classList.add("hidden"); }

    rowsEl.innerHTML="";
    draft.forEach(function(d,i){
      var row=document.createElement("div"); row.className="row";
      var nm=document.createElement("div"); nm.className="nm";
      nm.innerHTML = esc(d.name) + (d.isNew?' <span class="new">신규</span>':'');
      row.appendChild(nm);

      // 보관 세그먼트 (소진 모드에선 숨김 — 없앰만 하면 됨)
      if(draftMode!=="소진"){
        var seg=document.createElement("div"); seg.className="seg3";
        STORAGES.forEach(function(s){
          var b=document.createElement("button"); b.type="button"; b.dataset.s=s;
          b.dataset.on = d.storage===s?"1":"0"; b.textContent=s;
          b.addEventListener("click",function(){ d.storage=s; draftBatch=null; renderConfirm(); });
          seg.appendChild(b);
        });
        row.appendChild(seg);
      }

      var del=document.createElement("button"); del.className="del"; del.type="button"; del.innerHTML="✕";
      del.title="빼기"; del.addEventListener("click",function(){ draft.splice(i,1); renderConfirm(); });
      row.appendChild(del);

      // 신규 재료: 카테고리 지정 (내부 분류 학습용)
      if(d.isNew && draftMode!=="소진"){
        var nc=document.createElement("div"); nc.className="newcat";
        var lab=document.createElement("label"); lab.textContent="분류";
        var sel=document.createElement("select");
        CATS.forEach(function(c){ var o=document.createElement("option"); o.value=c; o.textContent=c; if(c===d.cat)o.selected=true; sel.appendChild(o); });
        sel.addEventListener("change",function(){ d.cat=sel.value; d.mgmt=guessMgmt(sel.value); });
        nc.appendChild(lab); nc.appendChild(sel);
        row.appendChild(nc);
      }
      rowsEl.appendChild(row);
    });
  }
  function guessMgmt(cat){
    return (["소스·양념","유제품","김치·절임","곡류·면"].indexOf(cat)>=0) ? "상비" : "신선";
  }

  // ── 확인 저장 ──
  function commit(){
    if(draft.length===0){ toast("추가된 재료가 없어요"); return; }
    var now=Date.now();
    draft.forEach(function(d){
      if(d.isNew){
        // 신규 재료를 마스터 확장에 등록 (다음부턴 인식됨)
        if(!findIng(d.name)){
          ext.push({n:d.name,s:d.storage,m:d.mgmt,c:d.cat,a:[]});
        }
      }
      if(draftMode==="소진"){
        if(inv[d.name]){ Object.keys(inv[d.name]).forEach(function(st){ inv[d.name][st].status="없음"; inv[d.name][st].updated=now; }); }
        else { inv[d.name]={}; inv[d.name][d.storage]={status:"없음",updated:now,src:"음성"}; }
      }else{
        inv[d.name]=inv[d.name]||{};
        inv[d.name][d.storage]={status:"있음",updated:now,src:"음성"};
      }
    });
    draft.forEach(function(d){ session.push({name:d.name,storage:d.storage,mode:draftMode}); });
    save(LS_EXT,ext); save(LS_INV,inv); save(LS_SESS,session);
    SURF=buildSurfaces();
    renderSession();
    var pushList=draft.map(function(d){ return d.name; });
    syncWrite(pushList);   // 공유 냉장고에 밀어씀 (실패 시 dirty 큐로 자동 재전송)
    var n=draft.length; draft=[]; draftBatch=null;
    confirmEl.classList.add("hidden"); rowsEl.innerHTML=""; batchEl.classList.add("hidden");
    toast(draftMode==="소진"? (n+"개 없음 처리") : (n+"개 담음 ✓"));
    renderStock();
  }

  // ── 재고 렌더 ──
  var curSto="냉장";
  var invlistEl=document.getElementById("invlist");
  function renderStock(){
    var items=Object.keys(inv).filter(function(k){ return inv[k][curSto] && inv[k][curSto].status==="있음"; });
    items.sort();
    invlistEl.innerHTML="";
    if(items.length===0){ var e=document.createElement("div"); e.className="empty"; e.textContent="아직 없어요. [입력]에서 담아보세요."; invlistEl.appendChild(e); return; }
    items.forEach(function(k){
      var it=document.createElement("div"); it.className="invitem";
      var elsewhere=STORAGES.filter(function(s){ return s!==curSto && inv[k][s] && inv[k][s].status==="있음"; });
      var also = elsewhere.length? ' · 또: '+elsewhere.join("/") : '';
      var left=document.createElement("div");
      left.innerHTML='<div class="n">'+esc(k)+'</div><div class="meta">'+timeAgo(inv[k][curSto].updated)+esc(also)+'</div>';
      var g=document.createElement("button"); g.className="gone"; g.type="button"; g.textContent="없앰";
      g.addEventListener("click",function(){ inv[k][curSto].status="없음"; inv[k][curSto].updated=Date.now(); save(LS_INV,inv); syncWrite([k]); renderStock(); toast(k+" ("+curSto+") 없음"); });
      it.appendChild(left); it.appendChild(g);
      invlistEl.appendChild(it);
    });
  }
  function timeAgo(t){ if(!t)return""; var d=Math.floor((Date.now()-t)/86400000); return d<=0?"오늘":d+"일 전"; }

  // ── 레시피 (menus) ──
  var menusCache=null, recCat="전체";
  function loadMenus(){
    if(menusCache){ renderMenus(); return; }
    sbFetch("GET","/menus?household_id=eq."+SB_HH+"&select=name,category,base_servings,recipe_text,recipe_url&order=category,name")
      .then(function(rows){ menusCache=rows||[]; renderMenus(); })
      .catch(function(){ document.getElementById("menuList").innerHTML='<div class="empty">레시피를 불러오지 못했어요. 연결을 확인하세요.</div>'; });
  }
  function renderMenus(){
    var listEl=document.getElementById("menuList"), catsEl=document.getElementById("recCats"), detEl=document.getElementById("recipeDetail");
    detEl.classList.add("hidden"); listEl.classList.remove("hidden"); catsEl.classList.remove("hidden");
    if(!menusCache || !menusCache.length){ listEl.innerHTML='<div class="empty">아직 레시피가 없어요.</div>'; catsEl.innerHTML=""; return; }
    var cats=["전체"]; menusCache.forEach(function(m){ if(cats.indexOf(m.category)<0) cats.push(m.category); });
    catsEl.innerHTML="";
    cats.forEach(function(c){
      var b=document.createElement("button"); b.type="button"; b.textContent=c; b.setAttribute("aria-selected", c===recCat?"true":"false");
      b.addEventListener("click",function(){ recCat=c; renderMenus(); });
      catsEl.appendChild(b);
    });
    var items=menusCache.filter(function(m){ return recCat==="전체"||m.category===recCat; });
    listEl.innerHTML="";
    items.forEach(function(m){
      var b=document.createElement("button"); b.className="menu-item"; b.type="button";
      b.innerHTML='<span><span class="mn">'+esc(m.name)+'</span><span class="mc">'+esc(m.category)+(m.base_servings?" · "+esc(m.base_servings):"")+'</span></span><span class="arw">›</span>';
      b.addEventListener("click",function(){ showRecipe(m); });
      listEl.appendChild(b);
    });
  }
  function showRecipe(m){
    var listEl=document.getElementById("menuList"), catsEl=document.getElementById("recCats"), detEl=document.getElementById("recipeDetail");
    listEl.classList.add("hidden"); catsEl.classList.add("hidden"); detEl.classList.remove("hidden");
    var url = m.recipe_url ? '<a class="rurl" href="'+esc(m.recipe_url)+'" target="_blank" rel="noopener">원문 보기 ↗</a>' : '';
    detEl.innerHTML='<button class="rback" type="button" id="rback">‹ 목록</button>'+
      '<h2>'+esc(m.name)+'</h2><div class="rmeta">'+esc(m.category)+(m.base_servings?" · "+esc(m.base_servings):"")+'</div>'+
      '<pre>'+esc(m.recipe_text||"(레시피 본문 없음)")+'</pre>'+url;
    document.getElementById("rback").addEventListener("click",renderMenus);
    window.scrollTo(0,0);
  }

  // ── 추천 (Vercel 함수 → Claude) ──
  var REC_URL="https://naengbu-api.vercel.app/api/recommend";
  var LS_REC="naengbu_rec";
  function recToday(){ return new Date().toLocaleDateString("en-CA"); } // YYYY-MM-DD(로컬)
  function loadRecCache(){
    var c=load(LS_REC,null);
    if(c && c.date===recToday() && c.cards && c.cards.length){
      document.getElementById("recGo").textContent="🔄 다시 추천";
      document.getElementById("recSub").textContent="오늘 받은 추천이에요 (다시 받으려면 위 버튼)";
      renderRecCards(c.cards, c.status||{});
    }
  }
  function fetchRec(){
    var go=document.getElementById("recGo"), sub=document.getElementById("recSub");
    go.disabled=true; sub.textContent="Claude가 한 상 고르는 중… (약 30초)"; acquireWake();
    fetch(REC_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})
      .then(function(r){ return r.json(); })
      .then(function(j){
        go.disabled=false;
        if(j.error){ sub.textContent="추천 실패: "+j.error; return; }
        if(j.refused){ sub.textContent="추천을 만들지 못했어요. 다시 시도해보세요."; return; }
        var cards=j.cards||[];
        if(!cards.length){ sub.textContent="추천이 비어서 왔어요. 다시 시도해보세요."; return; }
        save(LS_REC,{date:recToday(),cards:cards,status:{}});
        go.textContent="🔄 다시 추천"; sub.textContent="오늘 추천 "+cards.length+"개 — 마음에 드는 걸 골라요";
        renderRecCards(cards,{});
      })
      .catch(function(e){ go.disabled=false; sub.textContent="네트워크 오류: "+e.message; });
  }
  function saveRecStatus(idx,st){ var c=load(LS_REC,null); if(!c)return; c.status=c.status||{}; c.status[idx]=st; save(LS_REC,c); }
  function renderRecCards(cards,status){
    var el=document.getElementById("recCards"); el.innerHTML="";
    cards.forEach(function(c,idx){
      var st=status[idx];
      var card=document.createElement("div"); card.className="rcard"+(st==="거절"?" gone":"")+(st==="수락"?" accepted":"");
      var buy=(c.사올것&&c.사올것.length)
        ? '<div class="rc-buy">🛒 <b>사올 것:</b> '+esc(c.사올것.join(", "))+'</div>'
        : '<div class="rc-buy none">🛒 살 것 없음 — 냉장고로 충분</div>';
      var side=(c.반찬&&c.반찬.length)?'<div class="rc-side">곁들임: '+esc(c.반찬.join(" · "))+'</div>':'';
      card.innerHTML='<span class="rc-type">'+esc(c.형태)+'</span><h3>'+esc(c.이름)+'</h3>'+buy+side;
      if(st==="수락"){ appendRecRecipe(card,c); }
      else if(st!=="거절"){
        var acts=document.createElement("div"); acts.className="rc-actions";
        var acc=document.createElement("button"); acc.className="rc-accept"; acc.type="button"; acc.textContent="이걸로 ✓";
        acc.addEventListener("click",function(){ acceptRec(c,idx,card); });
        var rej=document.createElement("button"); rej.className="rc-reject"; rej.type="button"; rej.textContent="패스";
        rej.addEventListener("click",function(){ saveRecStatus(idx,"거절"); card.classList.add("gone"); acts.remove(); });
        acts.appendChild(acc); acts.appendChild(rej); card.appendChild(acts);
      }
      el.appendChild(card);
    });
  }
  function appendRecRecipe(card,c){
    if(card.querySelector(".rc-recipe")) return;
    var rec=document.createElement("div"); rec.className="rc-recipe"; rec.textContent=(c.레시피||[]).join("\n")||"(레시피 없음)";
    card.appendChild(rec);
  }
  function acceptRec(c,idx,card){
    saveRecStatus(idx,"수락"); card.classList.add("accepted");
    var acts=card.querySelector(".rc-actions"); if(acts) acts.remove();
    appendRecRecipe(card,c);
    // 차감: '쓰는재고' 중 신선재료를 없음 처리 (상비는 안 깎음 — v8 §2)
    var used=[];
    (c.쓰는재고||[]).forEach(function(nm){
      var ing=findIng(nm);
      if(ing && ing.m==="신선" && inv[nm]){
        Object.keys(inv[nm]).forEach(function(sT){ if(inv[nm][sT].status==="있음"){ inv[nm][sT].status="없음"; inv[nm][sT].updated=Date.now(); } });
        used.push(nm);
      }
    });
    if(used.length){ save(LS_INV,inv); syncWrite(used); renderStock(); }
    toast("'"+c.이름+"' 선택 ✓"+(used.length?" · "+used.length+"개 차감":""));
    window.scrollTo({top:card.offsetTop-70,behavior:"smooth"});
  }
  document.getElementById("recGo").addEventListener("click",fetchRec);

  // ── 탭 전환 ──
  document.querySelector(".tabs").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return;
    Array.prototype.forEach.call(this.querySelectorAll("button"),function(x){x.setAttribute("aria-selected",x===b?"true":"false");});
    var v=b.dataset.view;
    Array.prototype.forEach.call(document.querySelectorAll(".wrap > .view"),function(sec){ sec.classList.add("hidden"); });
    var show=document.getElementById("view-"+v); if(show) show.classList.remove("hidden");
    if(v==="stock") renderStock();
    if(v==="recipe") loadMenus();
    if(v==="recommend") loadRecCache();
  });
  document.getElementById("stotabs").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return;
    Array.prototype.forEach.call(this.querySelectorAll("button"),function(x){x.setAttribute("aria-selected",x===b?"true":"false");});
    curSto=b.dataset.s; renderStock();
  });

  // ── 텍스트/추가 입력 ──
  document.getElementById("textgo").addEventListener("click",function(){ acquireWake(); var v=document.getElementById("textin").value; if(v.trim()){ startConfirm(v); document.getElementById("textin").value=""; } });
  document.getElementById("textin").addEventListener("keydown",function(e){ if(e.key==="Enter") document.getElementById("textgo").click(); });
  document.getElementById("addgo").addEventListener("click",function(){ var el=document.getElementById("addin"); if(el.value.trim()){ addByName(el.value); el.value=""; } });
  document.getElementById("addin").addEventListener("keydown",function(e){ if(e.key==="Enter") document.getElementById("addgo").click(); });
  document.getElementById("confirmBtn").addEventListener("click",commit);
  document.getElementById("cancelBtn").addEventListener("click",function(){ draft=[]; draftBatch=null; confirmEl.classList.add("hidden"); rowsEl.innerHTML=""; batchEl.classList.add("hidden"); hideErr(); });

  // ── 음성 (음성테스트에서 검증된 iOS-safe 엔진) ──
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var listening=false, acc="", interimTxt="", rec=null, userStop=false, finalized=false, restartT=null;
  var mic=document.getElementById("mic"), micHint=document.getElementById("micHint");
  var isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  if(SR && isIOS){ var n=document.getElementById("iosNote"); n.classList.add("show"); n.innerHTML="아이폰은 <b>Safari</b>에서, 설정 › 일반 › 키보드 › <b>받아쓰기 켜기</b>가 필요해요. 침묵으로 자동종료되니 다 말하면 마이크를 다시 탭해 종료하세요."; }
  if(!SR){ var e=document.getElementById("errNote"); e.classList.add("show"); e.textContent="이 브라우저는 음성 인식을 지원하지 않아요. 아래 텍스트 입력을 쓰세요."; mic.disabled=true; }

  // 침묵으로 iOS가 세션을 끊어도 자동 재시작해 이어감. 종료는 오직 마이크 재탭.
  function micStart(){
    if(!SR) return;
    userStop=false; finalized=false; acc=""; interimTxt="";
    listening=true; mic.dataset.on="1"; mic.textContent="⏹";
    micHint.textContent="듣는 중… 다 부르면 마이크를 다시 탭해 종료"; hideErr();
    micSpawn();
  }
  function micSpawn(){
    try{ rec=new SR(); }catch(e){ return; }
    rec.lang="ko-KR"; rec.interimResults=true; rec.continuous=true; rec.maxAlternatives=1;
    rec.onresult=function(ev){
      var it="";
      for(var i=ev.resultIndex;i<ev.results.length;i++){ var r=ev.results[i]; if(r.isFinal) acc+=r[0].transcript+" "; else it+=r[0].transcript; }
      interimTxt=it; micHint.innerHTML='<b>'+esc((acc+" "+it).trim())+'</b>';
    };
    rec.onerror=function(ev){
      if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){ showErr("마이크/받아쓰기 권한을 확인하세요 (설정 › 일반 › 키보드 › 받아쓰기)."); userStop=true; }
      // no-speech / aborted / network → onend의 자동 재시작으로 이어감
    };
    rec.onend=function(){
      if(userStop || !listening){ micFinalize(); return; }
      if(restartT) clearTimeout(restartT);
      restartT=setTimeout(function(){ if(listening && !userStop) micSpawn(); }, 250);
    };
    try{ rec.start(); }catch(e){}
  }
  function micStop(){
    userStop=true; listening=false;
    mic.dataset.on="0"; mic.textContent="🎤"; micHint.textContent="정리 중…";
    if(restartT) clearTimeout(restartT);
    try{ rec&&rec.stop(); }catch(e){}
    setTimeout(function(){ try{ rec&&rec.abort(); }catch(e){} }, 300);
    setTimeout(micFinalize, 700);
  }
  function micFinalize(){
    if(finalized || !userStop) return;
    finalized=true; listening=false; mic.dataset.on="0"; mic.textContent="🎤";
    var text=(acc+" "+interimTxt).trim();
    micHint.textContent = text? '“'+text+'”' : "탭해서 말하기 — 예: “두부 계란 대파 샀어”";
    if(text) startConfirm(text);
  }
  mic.addEventListener("click",function(){
    acquireWake();
    if(listening) micStop(); else micStart();
  });

  // ── 내보내기 (마스터 확장 + 재고 → 텍스트) ──
  document.getElementById("exportBtn").addEventListener("click",function(){
    var lines=["# 윤봄네 냉장고 — 입력 스냅샷", new Date().toLocaleString("ko-KR"), ""];
    lines.push("## 사용자가 추가한 신규 재료 ("+ext.length+")  ← 마스터에 반영할 것");
    if(ext.length===0) lines.push("  (없음)");
    ext.forEach(function(x){ lines.push("  · "+x.n+" | "+x.s+" | "+x.m+" | "+x.c+(x.a&&x.a.length?" | alias: "+x.a.join(", "):"")); });
    lines.push("");
    lines.push("## 현재 재고");
    STORAGES.forEach(function(s){
      var has=Object.keys(inv).filter(function(k){return inv[k][s]&&inv[k][s].status==="있음";}).sort();
      lines.push("  ["+s+"] "+(has.join(", ")||"-"));
    });
    var gone=Object.keys(inv).filter(function(k){
      var b=inv[k]; var any있=false, any없=false;
      STORAGES.forEach(function(s){ if(b[s]){ if(b[s].status==="있음")any있=true; else any없=true; } });
      return any없 && !any있;
    }).sort();
    lines.push("  [없음] "+(gone.join(", ")||"-"));
    var out=lines.join("\n");
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(out).then(function(){toast("복사됨 ✓");},function(){fb(out);}); }
    else fb(out);
    function fb(t){ var ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); toast("복사됨 ✓"); }
  });

  // ── 세션 피드 (연속성) ──
  function renderSession(){
    var el=document.getElementById("session");
    if(!session.length){ el.classList.add("hidden"); el.innerHTML=""; return; }
    el.classList.remove("hidden");
    var chips=session.map(function(x){ return '<span class="sess-chip'+(x.mode==="소진"?" gone":"")+'" data-s="'+esc(x.storage)+'">'+esc(x.name)+'</span>'; }).join("");
    el.innerHTML='<div class="sh"><b>이번에 담은 것 ('+session.length+')</b><button class="clr" id="sessclr" type="button">세션 비우기</button></div><div class="sess-chips">'+chips+'</div>';
    document.getElementById("sessclr").addEventListener("click",function(){ session=[]; save(LS_SESS,session); renderSession(); toast("세션 비움"); });
  }

  // ── 화면 꺼짐 방지 (Wake Lock, iOS 16.4+) ──
  var wakeLock=null, keepAwake=true;
  function updateWakeChip(){ var b=document.getElementById("wakeBtn"); if(b) b.setAttribute("aria-pressed", keepAwake?"true":"false"); }
  function acquireWake(){
    if(!keepAwake || !("wakeLock" in navigator) || wakeLock) return;
    navigator.wakeLock.request("screen").then(function(wl){ wakeLock=wl; wl.addEventListener("release",function(){ wakeLock=null; }); }).catch(function(){});
  }
  function releaseWake(){ if(wakeLock){ try{wakeLock.release();}catch(e){} wakeLock=null; } }
  var wakeBtn=document.getElementById("wakeBtn");
  if(!("wakeLock" in navigator)){ keepAwake=false; wakeBtn.textContent="🔆 미지원"; wakeBtn.disabled=true; }
  updateWakeChip();
  wakeBtn.addEventListener("click",function(){
    keepAwake=!keepAwake; updateWakeChip();
    if(keepAwake){ acquireWake(); toast("화면 유지 켬"); } else { releaseWake(); toast("화면 유지 끔"); }
  });
  document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="visible" && keepAwake) acquireWake(); });

  // ── 유틸 ──
  var toastEl=document.getElementById("toast"), toastT=null;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove("show");},1600); }
  function showErr(m){ var e=document.getElementById("errNote"); e.classList.add("show"); e.textContent=m; }
  function hideErr(){ document.getElementById("errNote").classList.remove("show"); }
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }

  renderStock(); renderSession(); acquireWake();
  sbBoot();   // 공유 냉장고 동기화 (로컬 우선 → 당겨 병합 → 밀어올림)
})();
</script>
